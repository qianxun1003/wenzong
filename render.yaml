# Render Blueprint：前后端均部署在 Render
# Dashboard → New → Blueprint 选择本仓库；或分别手动创建两个 Web Service
services:
  - type: web
    name: wenzong-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: CORS_ORIGINS
        fromService:
          type: web
          name: wenzong-web
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: wenzong-web
    runtime: node
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: wenzong-api
          envVarKey: RENDER_EXTERNAL_URL
